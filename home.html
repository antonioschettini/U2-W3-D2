<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrazione Utente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1 class="text-center my-3">Salva contatto</h1>
    <div class="container d-flex justify-content-center align-content-center">
      <div class="row">
        <div class="col col-md-6 text-center">
          <h3 id="nome-salvato" class="text-secondary">Nessun nome salvato</h3>

          <form id="userForm">
            <div class="mb-3">
              <label for="username" class="form-label"
                >Inserisci il tuo Nome</label
              >
              <input
                type="text"
                class="form-control text-center"
                id="username"
                placeholder="Esempio: Mario"
              />
            </div>

            <button type="button" id="saveBtn" class="btn btn-primary">
              Salva Nome
            </button>

            <button type="button" id="removeBtn" class="btn btn-danger">
              Rimuovi Nome
            </button>
          </form>
        </div>
      </div>
    </div>
    <section class="timer my-3">
      <div class="container d-flex justify-content-center">
        <div class="row">
          <div class="col">
            <h2>Tempo trascorso: <span id="timer" class="text-danger">0</span> secondi</h2>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./home.js"></script>
  </body>
</html>
